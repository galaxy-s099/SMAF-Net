data:
  data_root: /kaggle/input/datasets/xingyushen666/abide-fc-three-atlas
  use_atlas:
    - aal
    - cc200
    - ho

train:
  seeds: [0]
  n_splits: 2
  epochs: 2
  batch_size: 16
  lr: 1.0e-3
  weight_decay: 1.0e-4

model:
  model_name: smaf_uncertainty_v4_2
  hidden_dim: 128
  embedding_dim: 64
  dropout: 0.5
  temperature: 1.0
  fusion: uncertainty_decision_fusion
  encoder: signed_edge_branch